<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prix obsoletes, Constructech Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F3EE; font-family: 'DM Sans', sans-serif; }
    @keyframes fadeCount { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const GOLD = "#C8A84E";
const DARK = "#1a1a2e";
const RED = "#e74c3c";
const GREEN = "#27ae60";
const ORANGE = "#e67e22";

function NumberTicker({ value, suffix = "", prefix = "", duration = 1200, active }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    if (!active) { setDisplay(0); return; }
    const num = parseInt(value);
    if (isNaN(num)) return;
    const t0 = Date.now();
    const tick = () => {
      const p = Math.min((Date.now() - t0) / duration, 1);
      setDisplay(Math.round((1 - Math.pow(1 - p, 3)) * num));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [active, value, duration]);
  return <span>{prefix}{display.toLocaleString("fr-FR")}{suffix}</span>;
}

function Slide({ active, dir, children }) {
  return (
    <div style={{
      position: "absolute", inset: 0,
      opacity: active ? 1 : 0,
      transform: active ? "translateX(0)" : dir === "next" ? "translateX(40px)" : "translateX(-40px)",
      transition: "all 0.45s cubic-bezier(0.16, 1, 0.3, 1)",
      pointerEvents: active ? "auto" : "none",
      display: "flex", flexDirection: "column", justifyContent: "center",
      padding: "40px 36px", overflow: "hidden",
    }}>
      {children}
    </div>
  );
}

function Anim({ children, delay = 0, active }) {
  return (
    <div style={{
      opacity: active ? 1 : 0,
      transform: active ? "translateY(0)" : "translateY(12px)",
      transition: `all 0.35s cubic-bezier(0.16, 1, 0.3, 1) ${delay}ms`,
    }}>
      {children}
    </div>
  );
}

const Tag = ({ children, color = GOLD }) => (
  <span style={{
    display: "inline-block", padding: "3px 12px", borderRadius: "100px",
    fontSize: "10px", fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase",
    color, border: `1px solid ${color}30`, background: `${color}0A`, marginBottom: "16px",
  }}>{children}</span>
);

const ChevronLeft = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
);
const ChevronRight = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
);

const FlowStep = ({ icon, label, sub, color = "#666", bg = "#FAF9F6", border = "#e8e5e0", accent = null }) => (
  <div style={{ background: bg, borderRadius: "10px", border: `1px solid ${border}`, padding: "12px 14px", display: "flex", alignItems: "center", gap: "10px", position: "relative" }}>
    {accent && <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: "4px", background: accent, borderRadius: "10px 0 0 10px" }}/>}
    <div style={{ width: "28px", height: "28px", borderRadius: "8px", background: `${color}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "14px", flexShrink: 0 }}>{icon}</div>
    <div style={{ flex: 1, minWidth: 0 }}>
      <p style={{ fontSize: "12px", fontWeight: 600, color: DARK, margin: 0 }}>{label}</p>
      {sub && <p style={{ fontSize: "10px", color: "#999", margin: "2px 0 0" }}>{sub}</p>}
    </div>
  </div>
);

const FlowArrow = ({ color = "#ddd", label = null }) => (
  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "3px 0" }}>
    <svg width="12" height="16" viewBox="0 0 12 16"><path d="M6 0v12M2 9l4 4 4-4" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
    {label && <span style={{ fontSize: "9px", color: "#bbb", marginTop: "1px" }}>{label}</span>}
  </div>
);

/* Bar chart component */
function BarChart({ data, active }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: "8px", justifyContent: "center", height: "160px", padding: "0 10px" }}>
      {data.map((item, i) => (
        <Anim key={i} delay={100 + i * 80} active={active}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "4px" }}>
            <span style={{ fontSize: "11px", fontWeight: 700, color: item.color || DARK }}>{item.value}</span>
            <div style={{
              width: "42px", borderRadius: "6px 6px 0 0",
              height: active ? `${item.height}px` : "0px",
              background: item.color || GOLD,
              transition: `height 0.8s cubic-bezier(0.16, 1, 0.3, 1) ${200 + i * 100}ms`,
            }}/>
            <span style={{ fontSize: "9px", color: "#999", textAlign: "center", maxWidth: "50px" }}>{item.label}</span>
          </div>
        </Anim>
      ))}
    </div>
  );
}

function PrixCarousel() {
  const [cur, setCur] = useState(0);
  const [dir, setDir] = useState("next");
  const TOTAL = 6;

  const go = (i) => { setDir(i > cur ? "next" : "prev"); setCur(i); };
  const next = () => go(Math.min(cur + 1, TOTAL - 1));
  const prev = () => go(Math.max(cur - 1, 0));

  useEffect(() => {
    const h = (e) => { if (e.key === "ArrowRight") next(); if (e.key === "ArrowLeft") prev(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [cur]);

  return (
    <div style={{
      fontFamily: "'DM Sans', sans-serif",
      background: "#F5F3EE",
      minHeight: "100vh",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: "20px",
    }}>
      <div style={{
        width: "100%", maxWidth: "680px", aspectRatio: "4/5",
        background: "#fff", borderRadius: "16px",
        boxShadow: "0 1px 2px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06)",
        position: "relative", overflow: "hidden", border: "1px solid #e8e5e0",
      }}>
        {/* Progress bar */}
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: "#eee", zIndex: 20 }}>
          <div style={{ height: "100%", width: `${((cur + 1) / TOTAL) * 100}%`, background: GOLD, transition: "width 0.4s ease", borderRadius: "0 1px 1px 0" }}/>
        </div>
        <div style={{ position: "absolute", top: "14px", right: "18px", fontSize: "11px", color: "#bbb", zIndex: 20, fontVariantNumeric: "tabular-nums" }}>
          {cur + 1}/{TOTAL}
        </div>

        {/* SLIDE 1: COVER, Citation */}
        <Slide active={cur === 0} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "500px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 0}><Tag>Constructech Club</Tag></Anim>
            <Anim delay={80} active={cur === 0}>
              <div style={{ fontSize: "48px", margin: "0 0 16px" }}>&#x1F937;</div>
            </Anim>
            <Anim delay={160} active={cur === 0}>
              <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(22px, 4.5vw, 34px)", fontWeight: 400, color: DARK, lineHeight: 1.2, margin: "0 0 12px", fontStyle: "italic" }}>
                "J'applique les prix<br/>d'il y a deux ans..."
              </h1>
            </Anim>
            <Anim delay={280} active={cur === 0}>
              <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(20px, 4vw, 30px)", color: GOLD, margin: "0 0 20px" }}>
                "...Pourquoi ?"
              </p>
            </Anim>
            <Anim delay={380} active={cur === 0}>
              <p style={{ fontSize: "14px", color: "#999", lineHeight: 1.6 }}>
                Comment des prix obsoletes dans les devis<br/>grignotent la marge sans que personne ne le voie.
              </p>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 2: L'ECART, Bar chart */}
        <Slide active={cur === 1} dir={dir}>
          <Anim delay={0} active={cur === 1}>
            <Tag color={RED}>L'ecart</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 4px" }}>Prix devis vs. prix reel</h2>
            <p style={{ fontSize: "12px", color: "#999", margin: "0 0 20px" }}>Ecart moyen constate sur 6 mois de devis</p>
          </Anim>
          <BarChart active={cur === 1} data={[
            { value: "+8%", height: 50, label: "Elec. courant", color: ORANGE },
            { value: "+12%", height: 70, label: "Plomberie", color: ORANGE },
            { value: "+18%", height: 100, label: "Gros oeuvre", color: RED },
            { value: "+22%", height: 115, label: "Menuiseries", color: RED },
            { value: "+31%", height: 140, label: "Isolation", color: RED },
          ]}/>
          <Anim delay={600} active={cur === 1}>
            <div style={{ background: `${RED}10`, borderRadius: "10px", border: `1px solid ${RED}25`, padding: "12px", textAlign: "center", marginTop: "16px" }}>
              <p style={{ fontSize: "12px", color: RED, margin: 0, fontWeight: 600 }}>
                Ecart moyen : <span style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px" }}>18%</span>, Isolation : <span style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px" }}>&gt;30%</span>
              </p>
            </div>
          </Anim>
        </Slide>

        {/* SLIDE 3: LE CERCLE VICIEUX, Cycle rouge */}
        <Slide active={cur === 2} dir={dir}>
          <Anim delay={0} active={cur === 2}>
            <Tag color={RED}>Le cercle vicieux</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 16px" }}>Pourquoi ca persiste</h2>
          </Anim>
          <div style={{ display: "flex", flexDirection: "column", gap: "0px" }}>
            <Anim delay={80} active={cur === 2}>
              <FlowStep icon="📁" label="Base de prix pas mise a jour" sub="Le metreur utilise un fichier Excel fige" color={RED} accent={RED}/>
            </Anim>
            <Anim delay={160} active={cur === 2}><FlowArrow color={RED}/></Anim>
            <Anim delay={200} active={cur === 2}>
              <FlowStep icon="📄" label="Devis envoye avec anciens prix" sub="Le client valide sans savoir que c’est sous-evalue" color={RED} accent={RED}/>
            </Anim>
            <Anim delay={280} active={cur === 2}><FlowArrow color={RED}/></Anim>
            <Anim delay={320} active={cur === 2}>
              <FlowStep icon="🏗️" label="Chantier lance, achats au prix reel" sub="Les fournisseurs facturent au tarif actuel" color={RED} bg="#FFF5F5" border="#fde2e2" accent={RED}/>
            </Anim>
            <Anim delay={400} active={cur === 2}><FlowArrow color={RED}/></Anim>
            <Anim delay={440} active={cur === 2}>
              <FlowStep icon="📉" label="Marge reelle inferieure a la marge prevue" sub="L’ecart se revele en fin de chantier, trop tard" color={RED} bg="#FFF5F5" border="#fde2e2" accent={RED}/>
            </Anim>
            <Anim delay={520} active={cur === 2}><FlowArrow color={RED}/></Anim>
            <Anim delay={560} active={cur === 2}>
              <FlowStep icon="🔄" label="Personne ne corrige la base" sub="On recommence au prochain devis" color={RED} bg="#FFF5F5" border="#fde2e2" accent={RED}/>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 4: LA SOLUTION, Flowchart vert */}
        <Slide active={cur === 3} dir={dir}>
          <Anim delay={0} active={cur === 3}>
            <Tag color={GREEN}>La solution</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 16px" }}>Extraction, comparaison, alertes</h2>
          </Anim>
          <div style={{ display: "flex", flexDirection: "column", gap: "0px" }}>
            <Anim delay={80} active={cur === 3}>
              <FlowStep icon="🔍" label="Extraction automatique des prix devis" sub="Chaque devis envoye alimente la base de comparaison" color={GREEN} accent={GREEN}/>
            </Anim>
            <Anim delay={180} active={cur === 3}><FlowArrow color={GREEN} label="Automatique"/></Anim>
            <Anim delay={220} active={cur === 3}>
              <FlowStep icon="📊" label="Comparaison avec les prix fournisseurs" sub="Ecart calcule en temps reel pour chaque reference" color="#3498db" accent="#3498db"/>
            </Anim>
            <Anim delay={320} active={cur === 3}><FlowArrow color={GREEN} label="Si ecart > seuil"/></Anim>
            <Anim delay={360} active={cur === 3}>
              <FlowStep icon="🔔" label="Alerte au metreur et au dirigeant" sub="Notification avant envoi du devis au client" color={GOLD} bg="#FFFBF0" border="#f5e6b8" accent={GOLD}/>
            </Anim>
            <Anim delay={460} active={cur === 3}><FlowArrow color={GREEN}/></Anim>
            <Anim delay={500} active={cur === 3}>
              <FlowStep icon="✅" label="Prix corrige, marge preservee" sub="Le devis part avec les bons prix. Zero surprise." color={GREEN} bg="#F0FAF4" border="#d4edda" accent={GREEN}/>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 5: RESULTAT */}
        <Slide active={cur === 4} dir={dir}>
          <div style={{ textAlign: "center" }}>
            <Anim delay={0} active={cur === 4}>
              <Tag color={GREEN}>Resultat</Tag>
              <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "24px", color: DARK, margin: "0 0 24px" }}>L'impact en 6 mois</h2>
            </Anim>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
              <Anim delay={100} active={cur === 4}>
                <div style={{ padding: "20px 14px", borderRadius: "14px", background: "#FFF5F5", border: "1px solid #fde2e2", textAlign: "center" }}>
                  <p style={{ fontSize: "10px", fontWeight: 700, color: RED, margin: "0 0 6px", textTransform: "uppercase", letterSpacing: "0.08em" }}>Avant</p>
                  <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "36px", color: RED, margin: "0 0 4px" }}>400</p>
                  <p style={{ fontSize: "11px", color: "#999", margin: 0 }}>references dans la base</p>
                </div>
              </Anim>
              <Anim delay={200} active={cur === 4}>
                <div style={{ padding: "20px 14px", borderRadius: "14px", background: "#F0FAF4", border: "1px solid #d4edda", textAlign: "center" }}>
                  <p style={{ fontSize: "10px", fontWeight: 700, color: GREEN, margin: "0 0 6px", textTransform: "uppercase", letterSpacing: "0.08em" }}>Apres</p>
                  <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "36px", color: GREEN, margin: "0 0 4px" }}>
                    <NumberTicker value={1200} active={cur === 4}/>
                  </p>
                  <p style={{ fontSize: "11px", color: "#999", margin: 0 }}>references trackees et alertees</p>
                </div>
              </Anim>
              <Anim delay={300} active={cur === 4}>
                <div style={{ padding: "20px 14px", borderRadius: "14px", background: "#FFF5F5", border: "1px solid #fde2e2", textAlign: "center" }}>
                  <p style={{ fontSize: "10px", fontWeight: 700, color: RED, margin: "0 0 6px", textTransform: "uppercase", letterSpacing: "0.08em" }}>Marge avant</p>
                  <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "36px", color: RED, margin: "0 0 4px" }}>6%</p>
                  <p style={{ fontSize: "11px", color: "#999", margin: 0 }}>marge reelle constatee</p>
                </div>
              </Anim>
              <Anim delay={400} active={cur === 4}>
                <div style={{ padding: "20px 14px", borderRadius: "14px", background: "#F0FAF4", border: "1px solid #d4edda", textAlign: "center" }}>
                  <p style={{ fontSize: "10px", fontWeight: 700, color: GREEN, margin: "0 0 6px", textTransform: "uppercase", letterSpacing: "0.08em" }}>Marge apres</p>
                  <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "36px", color: GREEN, margin: "0 0 4px" }}>11%</p>
                  <p style={{ fontSize: "11px", color: "#999", margin: 0 }}>marge reelle recuperee</p>
                </div>
              </Anim>
            </div>
            <Anim delay={500} active={cur === 4}>
              <p style={{ fontSize: "12px", color: "#bbb", marginTop: "16px", fontStyle: "italic" }}>
                +5 points de marge. Sans changer de fournisseur.
              </p>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 6: CTA */}
        <Slide active={cur === 5} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "440px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 5}>
              <div style={{ width: "48px", height: "48px", borderRadius: "50%", background: `${GOLD}15`, border: `1px solid ${GOLD}30`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", fontSize: "22px" }}>⚡</div>
            </Anim>
            <Anim delay={100} active={cur === 5}>
              <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "26px", color: DARK, lineHeight: 1.3, margin: "0 0 12px" }}>
                Le defi : compare tes 5 derniers devis avec les prix reels d'achat.
              </h2>
            </Anim>
            <Anim delay={200} active={cur === 5}>
              <p style={{ fontSize: "14px", color: "#888", lineHeight: 1.6, margin: "0 0 28px" }}>
                L'ecart va te surprendre.<br/>On t'aide a poser les chiffres et a corriger le tir.
              </p>
            </Anim>
            <Anim delay={300} active={cur === 5}>
              <div style={{
                display: "inline-flex", alignItems: "center", gap: "8px",
                padding: "14px 32px", borderRadius: "100px",
                background: GOLD, color: "#fff", fontSize: "14px", fontWeight: 600,
              }}>
                DM ouverts, constructech.club
              </div>
            </Anim>
            <Anim delay={450} active={cur === 5}>
              <div style={{ marginTop: "24px", display: "flex", gap: "8px", justifyContent: "center", flexWrap: "wrap" }}>
                {["Audit prix", "Base de donnees", "Alertes automatiques"].map((t, i) => (
                  <span key={i} style={{ padding: "5px 10px", borderRadius: "6px", background: "#FAF9F6", border: "1px solid #e8e5e0", fontSize: "10px", color: "#888", fontWeight: 500 }}>{t}</span>
                ))}
              </div>
            </Anim>
          </div>
        </Slide>

        {/* Navigation */}
        <div style={{
          position: "absolute", bottom: "16px", left: 0, right: 0,
          display: "flex", alignItems: "center", justifyContent: "center", gap: "12px",
          zIndex: 20,
        }}>
          <button onClick={prev} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === 0 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronLeft/></button>
          <div style={{ display: "flex", gap: "4px" }}>
            {Array.from({ length: TOTAL }, (_, i) => (
              <button key={i} onClick={() => go(i)} style={{
                width: i === cur ? "16px" : "6px", height: "6px", borderRadius: "3px",
                background: i === cur ? GOLD : "#ddd", border: "none", cursor: "pointer",
                transition: "all 0.3s ease",
              }}/>
            ))}
          </div>
          <button onClick={next} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === TOTAL - 1 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronRight/></button>
        </div>

        <p style={{ position: "absolute", bottom: "52px", left: 0, right: 0, textAlign: "center", fontSize: "10px", color: "#ccc" }}>
          ← → pour naviguer
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PrixCarousel/>);
</script>
</body>
</html>
