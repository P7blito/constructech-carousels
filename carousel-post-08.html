<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>86% admin, Constructech Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F3EE; font-family: 'DM Sans', sans-serif; }
    @keyframes fadeCount { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const GOLD = "#C8A84E";
const DARK = "#1a1a2e";
const RED = "#e74c3c";
const GREEN = "#27ae60";
const ORANGE = "#e67e22";
const BLUE = "#3498db";

function NumberTicker({ value, suffix = "", prefix = "", duration = 1200, active }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    if (!active) { setDisplay(0); return; }
    const num = parseFloat(value);
    if (isNaN(num)) return;
    const t0 = Date.now();
    const tick = () => {
      const p = Math.min((Date.now() - t0) / duration, 1);
      const v = (1 - Math.pow(1 - p, 3)) * num;
      setDisplay(Number.isInteger(num) ? Math.round(v) : Math.round(v * 10) / 10);
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [active, value, duration]);
  return <span>{prefix}{display.toLocaleString("fr-FR")}{suffix}</span>;
}

function Slide({ active, dir, children }) {
  return (
    <div style={{
      position: "absolute", inset: 0,
      opacity: active ? 1 : 0,
      transform: active ? "translateX(0)" : dir === "next" ? "translateX(40px)" : "translateX(-40px)",
      transition: "all 0.45s cubic-bezier(0.16, 1, 0.3, 1)",
      pointerEvents: active ? "auto" : "none",
      display: "flex", flexDirection: "column", justifyContent: "center",
      padding: "40px 36px", overflow: "hidden",
    }}>
      {children}
    </div>
  );
}

function Anim({ children, delay = 0, active }) {
  return (
    <div style={{
      opacity: active ? 1 : 0,
      transform: active ? "translateY(0)" : "translateY(12px)",
      transition: `all 0.35s cubic-bezier(0.16, 1, 0.3, 1) ${delay}ms`,
    }}>
      {children}
    </div>
  );
}

const Tag = ({ children, color = GOLD }) => (
  <span style={{
    display: "inline-block", padding: "3px 12px", borderRadius: "100px",
    fontSize: "10px", fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase",
    color, border: `1px solid ${color}30`, background: `${color}0A`, marginBottom: "16px",
  }}>{children}</span>
);

const ChevronLeft = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
);
const ChevronRight = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
);

function AdminCarousel() {
  const [cur, setCur] = useState(0);
  const [dir, setDir] = useState("next");
  const TOTAL = 6;

  const go = (i) => { setDir(i > cur ? "next" : "prev"); setCur(i); };
  const next = () => go(Math.min(cur + 1, TOTAL - 1));
  const prev = () => go(Math.max(cur - 1, 0));

  useEffect(() => {
    const h = (e) => { if (e.key === "ArrowRight") next(); if (e.key === "ArrowLeft") prev(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [cur]);

  const TimeBlock = ({ time, label, color, active, delay }) => (
    <Anim delay={delay} active={active}>
      <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "8px 0" }}>
        <div style={{ width: "48px", textAlign: "right", fontFamily: "'Instrument Serif', serif", fontSize: "18px", color: color || DARK, fontWeight: 400 }}>{time}</div>
        <div style={{ width: "3px", height: "28px", background: color || "#ddd", borderRadius: "2px" }}/>
        <p style={{ fontSize: "13px", color: "#666", margin: 0 }}>{label}</p>
      </div>
    </Anim>
  );

  /* Week grid data */
  const weekData = [
    { day: "Lun", items: [{ l: "Pointages", c: RED }, { l: "Relances", c: RED }] },
    { day: "Mar", items: [{ l: "Chantier", c: GREEN }, { l: "Commandes", c: RED }] },
    { day: "Mer", items: [{ l: "Devis", c: RED }, { l: "Compta", c: RED }] },
    { day: "Jeu", items: [{ l: "Chantier", c: GREEN }, { l: "Relances", c: RED }] },
    { day: "Ven", items: [{ l: "Planning", c: RED }, { l: "Chantier (0.5j)", c: GREEN }] },
  ];

  return (
    <div style={{
      fontFamily: "'DM Sans', sans-serif",
      background: "#F5F3EE",
      minHeight: "100vh",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: "20px",
    }}>
      <div style={{
        width: "100%", maxWidth: "680px", aspectRatio: "4/5",
        background: "#fff", borderRadius: "16px",
        boxShadow: "0 1px 2px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06)",
        position: "relative", overflow: "hidden", border: "1px solid #e8e5e0",
      }}>
        {/* Progress bar */}
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: "#eee", zIndex: 20 }}>
          <div style={{ height: "100%", width: `${((cur + 1) / TOTAL) * 100}%`, background: GOLD, transition: "width 0.4s ease", borderRadius: "0 1px 1px 0" }}/>
        </div>
        <div style={{ position: "absolute", top: "14px", right: "18px", fontSize: "11px", color: "#bbb", zIndex: 20, fontVariantNumeric: "tabular-nums" }}>
          {cur + 1}/{TOTAL}
        </div>

        {/* SLIDE 1: COVER, Stack de temps */}
        <Slide active={cur === 0} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "500px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 0}><Tag>Constructech Club</Tag></Anim>
            <Anim delay={80} active={cur === 0}>
              <div style={{ display: "flex", flexDirection: "column", gap: "6px", alignItems: "center", marginBottom: "20px" }}>
                {[
                  { time: "15 min", label: "pointer les heures" },
                  { time: "20 min", label: "relancer un fournisseur" },
                  { time: "30 min", label: "ressaisir un bon de commande" },
                  { time: "10 min", label: "chercher un document" },
                ].map((item, i) => (
                  <Anim key={i} delay={100 + i * 80} active={cur === 0}>
                    <div style={{ display: "flex", alignItems: "center", gap: "10px", background: "#FAF9F6", borderRadius: "8px", border: "1px solid #e8e5e0", padding: "8px 16px" }}>
                      <span style={{ fontFamily: "'Instrument Serif', serif", fontSize: "18px", color: RED, minWidth: "50px" }}>{item.time}</span>
                      <span style={{ fontSize: "12px", color: "#888" }}>{item.label}</span>
                    </div>
                  </Anim>
                ))}
              </div>
            </Anim>
            <Anim delay={450} active={cur === 0}>
              <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(22px, 5vw, 36px)", fontWeight: 400, color: DARK, lineHeight: 1.15, margin: "0 0 8px" }}>
                = <span style={{ color: RED }}>la semaine est pleine</span>
              </p>
            </Anim>
            <Anim delay={550} active={cur === 0}>
              <p style={{ fontSize: "14px", color: "#999", lineHeight: 1.6 }}>
                Et le chantier, il avance quand ?
              </p>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 2: SEMAINE TYPE, Grille */}
        <Slide active={cur === 1} dir={dir}>
          <Anim delay={0} active={cur === 1}>
            <Tag>Semaine type</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 4px" }}>Un conducteur de travaux moyen</h2>
            <p style={{ fontSize: "12px", color: "#999", margin: "0 0 16px" }}>Repartition reelle du temps sur 5 jours</p>
          </Anim>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "6px" }}>
            {weekData.map((d, di) => (
              <Anim key={di} delay={80 + di * 60} active={cur === 1}>
                <div style={{ textAlign: "center" }}>
                  <p style={{ fontSize: "11px", fontWeight: 700, color: DARK, margin: "0 0 6px" }}>{d.day}</p>
                  {d.items.map((item, ii) => (
                    <div key={ii} style={{
                      background: `${item.c}12`, border: `1px solid ${item.c}30`,
                      borderRadius: "6px", padding: "8px 4px", marginBottom: "4px",
                      fontSize: "9px", color: item.c, fontWeight: 600,
                    }}>{item.l}</div>
                  ))}
                </div>
              </Anim>
            ))}
          </div>
          <Anim delay={400} active={cur === 1}>
            <div style={{ display: "flex", justifyContent: "center", gap: "16px", marginTop: "16px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                <div style={{ width: "10px", height: "10px", borderRadius: "3px", background: `${GREEN}30`, border: `1px solid ${GREEN}50` }}/>
                <span style={{ fontSize: "10px", color: "#999" }}>Chantier (2.5j/5)</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                <div style={{ width: "10px", height: "10px", borderRadius: "3px", background: `${RED}30`, border: `1px solid ${RED}50` }}/>
                <span style={{ fontSize: "10px", color: "#999" }}>Admin (2.5j/5)</span>
              </div>
            </div>
          </Anim>
          <Anim delay={500} active={cur === 1}>
            <p style={{ fontSize: "12px", color: RED, textAlign: "center", marginTop: "12px", fontWeight: 600 }}>
              50% du temps perdu en taches administratives
            </p>
          </Anim>
        </Slide>

        {/* SLIDE 3: LE CHIFFRE, 86% big red */}
        <Slide active={cur === 2} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "450px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 2}>
              <Tag color={RED}>Le chiffre</Tag>
            </Anim>
            <Anim delay={100} active={cur === 2}>
              <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(80px, 20vw, 140px)", color: RED, lineHeight: 1, margin: "0 0 8px" }}>
                <NumberTicker value={86} suffix="%" active={cur === 2}/>
              </p>
            </Anim>
            <Anim delay={250} active={cur === 2}>
              <p style={{ fontSize: "16px", fontWeight: 600, color: DARK, margin: "0 0 8px" }}>
                des dirigeants BTP declarent passer trop de temps sur l'administratif
              </p>
            </Anim>
            <Anim delay={400} active={cur === 2}>
              <p style={{ fontSize: "13px", color: "#999", lineHeight: 1.6 }}>
                Le probleme n'est pas le manque de motivation.<br/>
                C'est que les process n'existent pas.
              </p>
            </Anim>
            <Anim delay={500} active={cur === 2}>
              <div style={{ marginTop: "20px", display: "flex", gap: "8px", justifyContent: "center", flexWrap: "wrap" }}>
                {["Pointages", "Relances", "Bons de commande", "Facturation"].map((t, i) => (
                  <span key={i} style={{ padding: "5px 10px", borderRadius: "6px", background: `${RED}08`, border: `1px solid ${RED}20`, fontSize: "10px", color: RED, fontWeight: 500 }}>{t}</span>
                ))}
              </div>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 4: LA METHODE, Timeline 3 mois */}
        <Slide active={cur === 3} dir={dir}>
          <Anim delay={0} active={cur === 3}>
            <Tag color={GREEN}>La methode</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 4px" }}>3 mois pour reprendre le controle</h2>
            <p style={{ fontSize: "12px", color: "#999", margin: "0 0 20px" }}>Un sujet a la fois. Pas de big bang.</p>
          </Anim>
          {[
            { month: "Mois 1", title: "Pointage automatise", desc: "Les heures remontent en un clic. Plus de ressaisie le vendredi soir.", icon: "⏱️", color: BLUE },
            { month: "Mois 2", title: "Relances automatiques", desc: "Factures, devis, sous-traitants : les relances partent toutes seules.", icon: "📨", color: GOLD },
            { month: "Mois 3", title: "Commandes centralisees", desc: "Un process unique pour commander, valider, et suivre les livraisons.", icon: "📦", color: GREEN },
          ].map((item, i) => (
            <Anim key={i} delay={100 + i * 120} active={cur === 3}>
              <div style={{ display: "flex", gap: "12px", alignItems: "flex-start", marginBottom: "12px" }}>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", flexShrink: 0 }}>
                  <div style={{ width: "36px", height: "36px", borderRadius: "10px", background: `${item.color}15`, border: `1px solid ${item.color}30`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "16px" }}>{item.icon}</div>
                  {i < 2 && <div style={{ width: "2px", height: "16px", background: "#e8e5e0", marginTop: "4px" }}/>}
                </div>
                <div>
                  <p style={{ fontSize: "10px", fontWeight: 700, color: item.color, textTransform: "uppercase", letterSpacing: "0.08em", margin: "0 0 2px" }}>{item.month}</p>
                  <p style={{ fontSize: "13px", fontWeight: 600, color: DARK, margin: "0 0 2px" }}>{item.title}</p>
                  <p style={{ fontSize: "11px", color: "#999", margin: 0 }}>{item.desc}</p>
                </div>
              </div>
            </Anim>
          ))}
        </Slide>

        {/* SLIDE 5: RESULTAT */}
        <Slide active={cur === 4} dir={dir}>
          <div style={{ textAlign: "center" }}>
            <Anim delay={0} active={cur === 4}>
              <Tag color={GREEN}>Resultat</Tag>
              <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "24px", color: DARK, margin: "0 0 24px" }}>Temps recupere, equipe renforcee</h2>
            </Anim>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
              <Anim delay={100} active={cur === 4}>
                <div style={{ padding: "20px 14px", borderRadius: "14px", background: "#FFF5F5", border: "1px solid #fde2e2", textAlign: "center" }}>
                  <p style={{ fontSize: "10px", fontWeight: 700, color: RED, margin: "0 0 6px", textTransform: "uppercase", letterSpacing: "0.08em" }}>Avant</p>
                  <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "40px", color: RED, margin: "0 0 4px" }}>2.5j</p>
                  <p style={{ fontSize: "11px", color: "#999", margin: 0 }}>sur chantier par semaine</p>
                </div>
              </Anim>
              <Anim delay={200} active={cur === 4}>
                <div style={{ padding: "20px 14px", borderRadius: "14px", background: "#F0FAF4", border: "1px solid #d4edda", textAlign: "center" }}>
                  <p style={{ fontSize: "10px", fontWeight: 700, color: GREEN, margin: "0 0 6px", textTransform: "uppercase", letterSpacing: "0.08em" }}>Apres</p>
                  <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "40px", color: GREEN, margin: "0 0 4px" }}>3.5j</p>
                  <p style={{ fontSize: "11px", color: "#999", margin: 0 }}>sur chantier par semaine</p>
                </div>
              </Anim>
            </div>
            <Anim delay={350} active={cur === 4}>
              <div style={{ background: `${GREEN}10`, borderRadius: "12px", border: `1px solid ${GREEN}25`, padding: "16px", marginTop: "16px", textAlign: "center" }}>
                <p style={{ fontSize: "13px", color: GREEN, fontWeight: 600, margin: "0 0 4px" }}>+1 jour chantier / semaine recupere</p>
                <p style={{ fontSize: "12px", color: "#999", margin: 0 }}>Assez pour prendre un apprenti et former la releve.</p>
              </div>
            </Anim>
            <Anim delay={450} active={cur === 4}>
              <p style={{ fontSize: "12px", color: "#bbb", marginTop: "14px", fontStyle: "italic" }}>
                Le dirigeant ne porte plus l'admin seul.
              </p>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 6: CTA */}
        <Slide active={cur === 5} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "440px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 5}>
              <div style={{ width: "48px", height: "48px", borderRadius: "50%", background: `${GOLD}15`, border: `1px solid ${GOLD}30`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", fontSize: "22px" }}>🔖</div>
            </Anim>
            <Anim delay={100} active={cur === 5}>
              <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "28px", color: DARK, lineHeight: 1.3, margin: "0 0 12px" }}>
                Enregistre ce post.
              </h2>
            </Anim>
            <Anim delay={200} active={cur === 5}>
              <p style={{ fontSize: "14px", color: "#888", lineHeight: 1.6, margin: "0 0 28px" }}>
                La prochaine fois que tu passes ta soiree<br/>a ressaisir des pointages, rouvre-le.<br/><br/>
                On t'aide a reprendre du temps chantier.<br/>Pas de logiciel. Du process.
              </p>
            </Anim>
            <Anim delay={300} active={cur === 5}>
              <div style={{
                display: "inline-flex", alignItems: "center", gap: "8px",
                padding: "14px 32px", borderRadius: "100px",
                background: GOLD, color: "#fff", fontSize: "14px", fontWeight: 600,
              }}>
                DM ouverts, constructech.club
              </div>
            </Anim>
            <Anim delay={450} active={cur === 5}>
              <div style={{ marginTop: "24px", display: "flex", gap: "8px", justifyContent: "center", flexWrap: "wrap" }}>
                {["Audit process", "Automatisation", "Formation equipe"].map((t, i) => (
                  <span key={i} style={{ padding: "5px 10px", borderRadius: "6px", background: "#FAF9F6", border: "1px solid #e8e5e0", fontSize: "10px", color: "#888", fontWeight: 500 }}>{t}</span>
                ))}
              </div>
            </Anim>
          </div>
        </Slide>

        {/* Navigation */}
        <div style={{
          position: "absolute", bottom: "16px", left: 0, right: 0,
          display: "flex", alignItems: "center", justifyContent: "center", gap: "12px",
          zIndex: 20,
        }}>
          <button onClick={prev} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === 0 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronLeft/></button>
          <div style={{ display: "flex", gap: "4px" }}>
            {Array.from({ length: TOTAL }, (_, i) => (
              <button key={i} onClick={() => go(i)} style={{
                width: i === cur ? "16px" : "6px", height: "6px", borderRadius: "3px",
                background: i === cur ? GOLD : "#ddd", border: "none", cursor: "pointer",
                transition: "all 0.3s ease",
              }}/>
            ))}
          </div>
          <button onClick={next} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === TOTAL - 1 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronRight/></button>
        </div>

        <p style={{ position: "absolute", bottom: "52px", left: 0, right: 0, textAlign: "center", fontSize: "10px", color: "#ccc" }}>
          ← → pour naviguer
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AdminCarousel/>);
</script>
</body>
</html>
