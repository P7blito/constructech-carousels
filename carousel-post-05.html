<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCTP automatise — Constructech Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F3EE; font-family: 'DM Sans', sans-serif; }
    @keyframes fadeCount { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const GOLD = "#C8A84E";
const DARK = "#1a1a2e";
const RED = "#e74c3c";
const GREEN = "#27ae60";
const ORANGE = "#e67e22";

function NumberTicker({ value, suffix = "", prefix = "", duration = 1200, active }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    if (!active) { setDisplay(0); return; }
    const num = parseInt(value);
    if (isNaN(num)) return;
    const t0 = Date.now();
    const tick = () => {
      const p = Math.min((Date.now() - t0) / duration, 1);
      setDisplay(Math.round((1 - Math.pow(1 - p, 3)) * num));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [active, value, duration]);
  return <span>{prefix}{display.toLocaleString("fr-FR")}{suffix}</span>;
}

function Slide({ active, dir, children }) {
  return (
    <div style={{
      position: "absolute", inset: 0,
      opacity: active ? 1 : 0,
      transform: active ? "translateX(0)" : dir === "next" ? "translateX(40px)" : "translateX(-40px)",
      transition: "all 0.45s cubic-bezier(0.16, 1, 0.3, 1)",
      pointerEvents: active ? "auto" : "none",
      display: "flex", flexDirection: "column", justifyContent: "center",
      padding: "40px 36px", overflow: "hidden",
    }}>
      {children}
    </div>
  );
}

function Anim({ children, delay = 0, active }) {
  return (
    <div style={{
      opacity: active ? 1 : 0,
      transform: active ? "translateY(0)" : "translateY(12px)",
      transition: `all 0.35s cubic-bezier(0.16, 1, 0.3, 1) ${delay}ms`,
    }}>
      {children}
    </div>
  );
}

const Tag = ({ children, color = GOLD }) => (
  <span style={{
    display: "inline-block", padding: "3px 12px", borderRadius: "100px",
    fontSize: "10px", fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase",
    color, border: `1px solid ${color}30`, background: `${color}0A`, marginBottom: "16px",
  }}>{children}</span>
);

const ChevronLeft = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
);
const ChevronRight = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
);

const FlowStep = ({ icon, label, sub, color = "#666", bg = "#FAF9F6", border = "#e8e5e0", accent = null }) => (
  <div style={{ background: bg, borderRadius: "10px", border: `1px solid ${border}`, padding: "12px 14px", display: "flex", alignItems: "center", gap: "10px", position: "relative" }}>
    {accent && <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: "4px", background: accent, borderRadius: "10px 0 0 10px" }}/>}
    <div style={{ width: "28px", height: "28px", borderRadius: "8px", background: `${color}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "14px", flexShrink: 0 }}>{icon}</div>
    <div style={{ flex: 1, minWidth: 0 }}>
      <p style={{ fontSize: "12px", fontWeight: 600, color: DARK, margin: 0 }}>{label}</p>
      {sub && <p style={{ fontSize: "10px", color: "#999", margin: "2px 0 0" }}>{sub}</p>}
    </div>
  </div>
);

const FlowArrow = ({ color = "#ddd", label = null }) => (
  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "3px 0" }}>
    <svg width="12" height="16" viewBox="0 0 12 16"><path d="M6 0v12M2 9l4 4 4-4" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
    {label && <span style={{ fontSize: "9px", color: "#bbb", marginTop: "1px" }}>{label}</span>}
  </div>
);

function Carousel() {
  const [cur, setCur] = useState(0);
  const [dir, setDir] = useState("next");
  const TOTAL = 6;

  const go = (i) => { setDir(i > cur ? "next" : "prev"); setCur(i); };
  const next = () => go(Math.min(cur + 1, TOTAL - 1));
  const prev = () => go(Math.max(cur - 1, 0));

  useEffect(() => {
    const h = (e) => { if (e.key === "ArrowRight") next(); if (e.key === "ArrowLeft") prev(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [cur]);

  return (
    <div style={{
      fontFamily: "'DM Sans', sans-serif",
      background: "#F5F3EE",
      minHeight: "100vh",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: "20px",
    }}>
      <div style={{
        width: "100%", maxWidth: "680px", aspectRatio: "4/5",
        background: "#fff", borderRadius: "16px",
        boxShadow: "0 1px 2px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06)",
        position: "relative", overflow: "hidden", border: "1px solid #e8e5e0",
      }}>
        {/* Progress bar */}
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: "#eee", zIndex: 20 }}>
          <div style={{ height: "100%", width: `${((cur + 1) / TOTAL) * 100}%`, background: GOLD, transition: "width 0.4s ease", borderRadius: "0 1px 1px 0" }}/>
        </div>
        <div style={{ position: "absolute", top: "14px", right: "18px", fontSize: "11px", color: "#bbb", zIndex: 20, fontVariantNumeric: "tabular-nums" }}>
          {cur + 1}/{TOTAL}
        </div>

        {/* SLIDE 1: COVER */}
        <Slide active={cur === 0} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "500px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 0}><Tag>Constructech Club</Tag></Anim>
            <Anim delay={80} active={cur === 0}>
              <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(22px, 4.5vw, 34px)", fontWeight: 400, color: DARK, lineHeight: 1.25, margin: "0 0 16px" }}>
                Rediger un CCTP a la main.
              </h1>
            </Anim>
            <Anim delay={160} active={cur === 0}>
              <p style={{ fontSize: "clamp(18px, 4vw, 28px)", fontWeight: 400, color: GOLD, margin: "0 0 24px", lineHeight: 1.2, fontFamily: "'Instrument Serif', serif" }}>
                Le cauchemar discret<br/>de chaque economiste.
              </p>
            </Anim>
            <Anim delay={280} active={cur === 0}>
              <p style={{ fontSize: "14px", color: "#999", lineHeight: 1.6 }}>
                3 a 5 jours de copier-coller.<br/>Il y a mieux a faire.
              </p>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 2: PROCESS ACTUEL */}
        <Slide active={cur === 1} dir={dir}>
          <Anim delay={0} active={cur === 1}>
            <Tag color={RED}>Le process actuel</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 16px" }}>3 a 5 jours de copier-coller</h2>
          </Anim>
          <div style={{ display: "flex", flexDirection: "column", gap: "0px" }}>
            <Anim delay={80} active={cur === 1}>
              <FlowStep icon="📄" label="Reprendre un ancien CCTP" sub="Trouver le bon modele dans les archives" color={RED} accent={RED}/>
            </Anim>
            <Anim delay={120} active={cur === 1}><FlowArrow color={RED}/></Anim>
            <Anim delay={140} active={cur === 1}>
              <FlowStep icon="📋" label="Copier-coller les lots" sub="Adapter chaque lot, chaque article, chaque detail" color={RED} accent={RED}/>
            </Anim>
            <Anim delay={180} active={cur === 1}><FlowArrow color={RED}/></Anim>
            <Anim delay={200} active={cur === 1}>
              <FlowStep icon="✏️" label="Adapter au projet" sub="Modifier les specs, les normes, les materiaux" color={RED} bg="#FFF5F5" border="#fde2e2" accent={RED}/>
            </Anim>
            <Anim delay={240} active={cur === 1}><FlowArrow color={RED}/></Anim>
            <Anim delay={260} active={cur === 1}>
              <FlowStep icon="🔍" label="Verifier la coherence" sub="Relire chaque ligne, chaque reference" color={ORANGE} bg="#FFF8F0" border="#fde8cc" accent={ORANGE}/>
            </Anim>
            <Anim delay={300} active={cur === 1}><FlowArrow color={RED}/></Anim>
            <Anim delay={320} active={cur === 1}>
              <FlowStep icon="📊" label="Verifier la coherence avec le DPGF" sub="Croiser CCTP et DPGF ligne par ligne" color={RED} bg="#FFF5F5" border="#fde2e2" accent={RED}/>
            </Anim>
          </div>
          <Anim delay={400} active={cur === 1}>
            <div style={{ textAlign: "center", marginTop: "10px", padding: "6px 16px", borderRadius: "8px", background: "#FFF5F5", border: "1px solid #fde2e2" }}>
              <p style={{ fontSize: "11px", color: RED, fontWeight: 600, margin: 0 }}>3 a 5 jours par CCTP. A chaque projet.</p>
            </div>
          </Anim>
        </Slide>

        {/* SLIDE 3: LE PROBLEME */}
        <Slide active={cur === 2} dir={dir}>
          <Anim delay={0} active={cur === 2}>
            <Tag color={RED}>Le probleme</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 20px" }}>Un metier en tension</h2>
          </Anim>

          <Anim delay={100} active={cur === 2}>
            <div style={{ background: "#FFF5F5", borderRadius: "14px", border: "1px solid #fde2e2", padding: "24px", textAlign: "center", marginBottom: "14px" }}>
              <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "48px", color: RED, margin: "0 0 4px", lineHeight: 1 }}>
                <NumberTicker value={2500} active={cur === 2}/>
              </p>
              <p style={{ fontSize: "13px", color: RED, margin: 0, fontWeight: 500 }}>economistes de la construction en France</p>
            </div>
          </Anim>

          <Anim delay={200} active={cur === 2}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
              <div style={{ background: "#FAF9F6", borderRadius: "10px", border: "1px solid #e8e5e0", padding: "14px", textAlign: "center" }}>
                <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "24px", color: ORANGE, margin: "0 0 2px" }}>60%</p>
                <p style={{ fontSize: "10px", color: "#999", margin: 0 }}>du temps sur<br/>du copier-coller</p>
              </div>
              <div style={{ background: "#FAF9F6", borderRadius: "10px", border: "1px solid #e8e5e0", padding: "14px", textAlign: "center" }}>
                <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "24px", color: ORANGE, margin: "0 0 2px" }}>3-5j</p>
                <p style={{ fontSize: "10px", color: "#999", margin: 0 }}>par CCTP<br/>en moyenne</p>
              </div>
            </div>
          </Anim>

          <Anim delay={300} active={cur === 2}>
            <p style={{ fontSize: "12px", color: "#bbb", textAlign: "center", marginTop: "14px", fontStyle: "italic" }}>
              Des pros surqualifies qui passent leur temps a copier-coller.
            </p>
          </Anim>
        </Slide>

        {/* SLIDE 4: LA SOLUTION */}
        <Slide active={cur === 3} dir={dir}>
          <Anim delay={0} active={cur === 3}>
            <Tag color={GREEN}>La solution</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 16px" }}>De 5 jours a 1 jour</h2>
          </Anim>
          <div style={{ display: "flex", flexDirection: "column", gap: "0px" }}>
            <Anim delay={80} active={cur === 3}>
              <FlowStep icon="📐" label="Plans + Programme" sub="L'economiste fournit les documents du projet" color={GREEN} bg="#F0FAF4" border="#d4edda" accent={GREEN}/>
            </Anim>
            <Anim delay={140} active={cur === 3}><FlowArrow color={GREEN} label="Automatique"/></Anim>
            <Anim delay={160} active={cur === 3}>
              <FlowStep icon="🤖" label="L'IA genere le CCTP" sub="Structure, lots, articles, normes, specifications" color={GREEN} bg="#F0FAF4" border="#d4edda" accent={GREEN}/>
            </Anim>
            <Anim delay={220} active={cur === 3}><FlowArrow color={GREEN}/></Anim>
            <Anim delay={260} active={cur === 3}>
              <FlowStep icon="🔍" label="Relecture par l'economiste" sub="Verification technique, ajustements fins" color={GOLD} bg="#FFFBF0" border="#f5e6b8" accent={GOLD}/>
            </Anim>
            <Anim delay={320} active={cur === 3}><FlowArrow color={GREEN}/></Anim>
            <Anim delay={360} active={cur === 3}>
              <FlowStep icon="✅" label="Validation finale" sub="CCTP + DPGF coherents, prets a envoyer" color={GREEN} bg="#F0FAF4" border="#d4edda" accent={GREEN}/>
            </Anim>
          </div>
          <Anim delay={440} active={cur === 3}>
            <div style={{ textAlign: "center", marginTop: "12px", padding: "8px 16px", borderRadius: "8px", background: "#F0FAF4", border: "1px solid #d4edda" }}>
              <p style={{ fontSize: "11px", color: GREEN, fontWeight: 600, margin: 0 }}>1 jour au lieu de 5. L'economiste reste expert, pas copiste.</p>
            </div>
          </Anim>
        </Slide>

        {/* SLIDE 5: CITATION */}
        <Slide active={cur === 4} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "460px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 4}>
              <div style={{ fontSize: "40px", margin: "0 0 20px", opacity: 0.3 }}>&#8220;</div>
            </Anim>
            <Anim delay={100} active={cur === 4}>
              <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(22px, 4.5vw, 32px)", color: DARK, lineHeight: 1.3, margin: "0 0 20px", fontStyle: "italic" }}>
                Je fais enfin de l'architecture.
              </p>
            </Anim>
            <Anim delay={200} active={cur === 4}>
              <p style={{ fontSize: "13px", color: "#999", margin: "0 0 24px" }}>— Un economiste de la construction, apres 3 mois d'utilisation</p>
            </Anim>
            <Anim delay={300} active={cur === 4}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
                <div style={{ padding: "16px", borderRadius: "12px", background: "#FFF5F5", border: "1px solid #fde2e2", textAlign: "center" }}>
                  <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "28px", color: RED, margin: "0 0 4px" }}>3-5j</p>
                  <p style={{ fontSize: "10px", color: "#999", margin: 0 }}>Avant</p>
                </div>
                <div style={{ padding: "16px", borderRadius: "12px", background: "#F0FAF4", border: "1px solid #d4edda", textAlign: "center" }}>
                  <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "28px", color: GREEN, margin: "0 0 4px" }}>1j</p>
                  <p style={{ fontSize: "10px", color: "#999", margin: 0 }}>Apres</p>
                </div>
              </div>
            </Anim>
            <Anim delay={400} active={cur === 4}>
              <p style={{ fontSize: "12px", color: "#bbb", marginTop: "16px", fontStyle: "italic" }}>
                Moins de copier-coller, plus de conception.
              </p>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 6: CTA */}
        <Slide active={cur === 5} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "440px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 5}>
              <div style={{ fontSize: "48px", margin: "0 0 16px" }}>📐</div>
            </Anim>
            <Anim delay={100} active={cur === 5}>
              <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "28px", color: DARK, lineHeight: 1.3, margin: "0 0 12px" }}>
                Vous redigez des CCTP ? Parlons-en.
              </h2>
            </Anim>
            <Anim delay={200} active={cur === 5}>
              <p style={{ fontSize: "14px", color: "#888", lineHeight: 1.6, margin: "0 0 28px" }}>
                On travaille avec des economistes pour automatiser la redaction technique. Mes DM sont ouverts.
              </p>
            </Anim>
            <Anim delay={300} active={cur === 5}>
              <div style={{
                display: "inline-flex", alignItems: "center", gap: "8px",
                padding: "14px 32px", borderRadius: "100px",
                background: GOLD, color: "#fff", fontSize: "14px", fontWeight: 600,
              }}>
                DM ouverts — constructech.club
              </div>
            </Anim>
            <Anim delay={450} active={cur === 5}>
              <div style={{ marginTop: "24px", display: "flex", gap: "8px", justifyContent: "center", flexWrap: "wrap" }}>
                {["CCTP auto", "IA technique", "Economie construction"].map((t, i) => (
                  <span key={i} style={{ padding: "5px 10px", borderRadius: "6px", background: "#FAF9F6", border: "1px solid #e8e5e0", fontSize: "10px", color: "#888", fontWeight: 500 }}>{t}</span>
                ))}
              </div>
            </Anim>
          </div>
        </Slide>

        {/* Navigation */}
        <div style={{
          position: "absolute", bottom: "16px", left: 0, right: 0,
          display: "flex", alignItems: "center", justifyContent: "center", gap: "12px",
          zIndex: 20,
        }}>
          <button onClick={prev} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === 0 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronLeft/></button>
          <div style={{ display: "flex", gap: "4px" }}>
            {Array.from({ length: TOTAL }, (_, i) => (
              <button key={i} onClick={() => go(i)} style={{
                width: i === cur ? "16px" : "6px", height: "6px", borderRadius: "3px",
                background: i === cur ? GOLD : "#ddd", border: "none", cursor: "pointer",
                transition: "all 0.3s ease",
              }}/>
            ))}
          </div>
          <button onClick={next} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === TOTAL - 1 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronRight/></button>
        </div>

        <p style={{ position: "absolute", bottom: "52px", left: 0, right: 0, textAlign: "center", fontSize: "10px", color: "#ccc" }}>
          ← → pour naviguer
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Carousel/>);
</script>
</body>
</html>
