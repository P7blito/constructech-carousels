<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conducteur barr&eacute;, Constructech Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F3EE; font-family: 'DM Sans', sans-serif; }
    @keyframes fadeCount { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const GOLD = "#C8A84E";
const DARK = "#1a1a2e";
const RED = "#e74c3c";
const GREEN = "#27ae60";
const ORANGE = "#e67e22";

function Slide({ active, dir, children }) {
  return (
    <div style={{
      position: "absolute", inset: 0,
      opacity: active ? 1 : 0,
      transform: active ? "translateX(0)" : dir === "next" ? "translateX(40px)" : "translateX(-40px)",
      transition: "all 0.45s cubic-bezier(0.16, 1, 0.3, 1)",
      pointerEvents: active ? "auto" : "none",
      display: "flex", flexDirection: "column", justifyContent: "center",
      padding: "40px 36px", overflow: "hidden",
    }}>
      {children}
    </div>
  );
}

function Anim({ children, delay = 0, active }) {
  return (
    <div style={{
      opacity: active ? 1 : 0,
      transform: active ? "translateY(0)" : "translateY(12px)",
      transition: `all 0.35s cubic-bezier(0.16, 1, 0.3, 1) ${delay}ms`,
    }}>
      {children}
    </div>
  );
}

const Tag = ({ children, color = GOLD }) => (
  <span style={{
    display: "inline-block", padding: "3px 12px", borderRadius: "100px",
    fontSize: "10px", fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase",
    color, border: `1px solid ${color}30`, background: `${color}0A`, marginBottom: "16px",
  }}>{children}</span>
);

const ChevronLeft = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
);
const ChevronRight = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
);

const FlowStep = ({ icon, label, sub, color = "#666", bg = "#FAF9F6", border = "#e8e5e0", accent = null }) => (
  <div style={{ background: bg, borderRadius: "10px", border: `1px solid ${border}`, padding: "12px 14px", display: "flex", alignItems: "center", gap: "10px", position: "relative" }}>
    {accent && <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: "4px", background: accent, borderRadius: "10px 0 0 10px" }}/>}
    <div style={{ width: "28px", height: "28px", borderRadius: "8px", background: `${color}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "14px", flexShrink: 0 }}>{icon}</div>
    <div style={{ flex: 1, minWidth: 0 }}>
      <p style={{ fontSize: "12px", fontWeight: 600, color: DARK, margin: 0 }}>{label}</p>
      {sub && <p style={{ fontSize: "10px", color: "#999", margin: "2px 0 0" }}>{sub}</p>}
    </div>
  </div>
);

const FlowArrow = ({ color = "#ddd", label = null }) => (
  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "3px 0" }}>
    <svg width="12" height="16" viewBox="0 0 12 16"><path d="M6 0v12M2 9l4 4 4-4" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
    {label && <span style={{ fontSize: "9px", color: "#bbb", marginTop: "1px" }}>{label}</span>}
  </div>
);

function Carousel() {
  const [cur, setCur] = useState(0);
  const [dir, setDir] = useState("next");
  const TOTAL = 5;

  const go = (i) => { setDir(i > cur ? "next" : "prev"); setCur(i); };
  const next = () => go(Math.min(cur + 1, TOTAL - 1));
  const prev = () => go(Math.max(cur - 1, 0));

  useEffect(() => {
    const h = (e) => { if (e.key === "ArrowRight") next(); if (e.key === "ArrowLeft") prev(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [cur]);

  return (
    <div style={{
      fontFamily: "'DM Sans', sans-serif",
      background: "#F5F3EE",
      minHeight: "100vh",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: "20px",
    }}>
      <div style={{
        width: "100%", maxWidth: "680px", aspectRatio: "4/5",
        background: "#fff", borderRadius: "16px",
        boxShadow: "0 1px 2px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06)",
        position: "relative", overflow: "hidden", border: "1px solid #e8e5e0",
      }}>
        {/* Progress bar */}
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: "#eee", zIndex: 20 }}>
          <div style={{ height: "100%", width: `${((cur + 1) / TOTAL) * 100}%`, background: GOLD, transition: "width 0.4s ease", borderRadius: "0 1px 1px 0" }}/>
        </div>
        <div style={{ position: "absolute", top: "14px", right: "18px", fontSize: "11px", color: "#bbb", zIndex: 20, fontVariantNumeric: "tabular-nums" }}>
          {cur + 1}/{TOTAL}
        </div>

        {/* SLIDE 1: COVER */}
        <Slide active={cur === 0} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "500px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 0}><Tag>Constructech Club</Tag></Anim>
            <Anim delay={80} active={cur === 0}>
              <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(24px, 4.5vw, 36px)", fontWeight: 400, color: DARK, lineHeight: 1.15, margin: "0 0 16px" }}>
                Son conducteur s'est barré.
              </h1>
            </Anim>
            <Anim delay={160} active={cur === 0}>
              <div style={{ width: "40px", height: "1px", background: GOLD, margin: "0 auto 16px" }}/>
              <p style={{ fontSize: "clamp(16px, 3vw, 22px)", fontWeight: 500, color: GOLD, margin: "0 0 24px", lineHeight: 1.3, fontFamily: "'Instrument Serif', serif" }}>
                Avec toutes les infos dans sa tête.
              </p>
            </Anim>
            <Anim delay={280} active={cur === 0}>
              <p style={{ fontSize: "13px", color: "#999", lineHeight: 1.6 }}>
                Quand un départ vide le chantier<br/>de toute sa mémoire.
              </p>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 2: CE QUI EST PARTI */}
        <Slide active={cur === 1} dir={dir}>
          <Anim delay={0} active={cur === 1}>
            <Tag color={RED}>Ce qui est parti</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 16px" }}>Tout était dans sa tête</h2>
          </Anim>
          <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
            {[
              { icon: "📱", label: "Les contacts fournisseurs", sub: "Num\u00e9ros directs, interlocuteurs, habitudes" },
              { icon: "🤝", label: "Les habitudes de chaque sous-traitant", sub: "Qui est fiable, qui ne l'est pas" },
              { icon: "📝", label: "Les accords informels", sub: "Arrangements oraux, faveurs, d\u00e9lais n\u00e9goci\u00e9s" },
              { icon: "💰", label: "Les prix n\u00e9goci\u00e9s", sub: "Tarifs sp\u00e9ciaux, remises, conditions" },
              { icon: "📅", label: "Les dates cl\u00e9s", sub: "Jalons, relances, \u00e9ch\u00e9ances critiques" },
            ].map((item, i) => (
              <Anim key={i} delay={80 + i * 70} active={cur === 1}>
                <div style={{ display: "flex", alignItems: "center", gap: "12px", padding: "12px 14px", borderRadius: "10px", background: "#FFF5F5", border: "1px solid #fde2e2" }}>
                  <span style={{ fontSize: "20px" }}>{item.icon}</span>
                  <div>
                    <p style={{ fontSize: "12px", fontWeight: 600, color: DARK, margin: 0 }}>{item.label}</p>
                    <p style={{ fontSize: "10px", color: "#999", margin: "2px 0 0" }}>{item.sub}</p>
                  </div>
                </div>
              </Anim>
            ))}
          </div>
          <Anim delay={450} active={cur === 1}>
            <div style={{ marginTop: "12px", padding: "10px", borderRadius: "8px", background: `${RED}08`, border: `1px solid ${RED}20`, textAlign: "center" }}>
              <p style={{ fontSize: "12px", color: RED, fontWeight: 700, margin: 0 }}>Rien n'était écrit.</p>
            </div>
          </Anim>
        </Slide>

        {/* SLIDE 3: LE CHAOS */}
        <Slide active={cur === 2} dir={dir}>
          <div style={{ textAlign: "center" }}>
            <Anim delay={0} active={cur === 2}>
              <Tag color={RED}>Le chaos</Tag>
            </Anim>
            <Anim delay={100} active={cur === 2}>
              <div style={{ background: "#FFF5F5", borderRadius: "14px", border: "1px solid #fde2e2", padding: "32px", marginBottom: "20px" }}>
                <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "56px", color: RED, margin: "0 0 8px", lineHeight: 1 }}>3 semaines</p>
                <p style={{ fontSize: "13px", color: RED, fontWeight: 500, margin: 0 }}>de flottement total</p>
              </div>
            </Anim>
            <Anim delay={250} active={cur === 2}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "16px" }}>
                {[
                  { icon: "🔴", label: "Retards en cascade", desc: "Personne ne sait qui relancer" },
                  { icon: "🔴", label: "Fournisseurs perdus", desc: "Plus de contact direct" },
                  { icon: "🔴", label: "\u00c9quipes dans le flou", desc: "Pas de planning \u00e0 jour" },
                  { icon: "🔴", label: "Client m\u00e9content", desc: "Aucune visibilit\u00e9 donn\u00e9e" },
                ].map((item, i) => (
                  <div key={i} style={{ background: "#FAF9F6", borderRadius: "10px", border: "1px solid #e8e5e0", padding: "12px", textAlign: "center" }}>
                    <p style={{ fontSize: "16px", margin: "0 0 4px" }}>{item.icon}</p>
                    <p style={{ fontSize: "11px", fontWeight: 600, color: DARK, margin: "0 0 2px" }}>{item.label}</p>
                    <p style={{ fontSize: "9px", color: "#999", margin: 0 }}>{item.desc}</p>
                  </div>
                ))}
              </div>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 4: SOLUTION */}
        <Slide active={cur === 3} dir={dir}>
          <Anim delay={0} active={cur === 3}>
            <Tag color={GREEN}>La solution</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 16px" }}>Fiches chantier vivantes</h2>
          </Anim>
          <div style={{ display: "flex", flexDirection: "column", gap: "0px" }}>
            <Anim delay={80} active={cur === 3}>
              <FlowStep icon="📋" label="1 fiche par chantier" sub="Contacts, accords, prix, jalons, tout au m\u00eame endroit" color={GREEN} accent={GREEN}/>
            </Anim>
            <Anim delay={140} active={cur === 3}><FlowArrow color={GREEN}/></Anim>
            <Anim delay={160} active={cur === 3}>
              <FlowStep icon="⏱️" label="2 minutes par jour" sub="Le conducteur met \u00e0 jour en fin de journ\u00e9e" color="#3498db" accent="#3498db"/>
            </Anim>
            <Anim delay={220} active={cur === 3}><FlowArrow color={GREEN}/></Anim>
            <Anim delay={260} active={cur === 3}>
              <FlowStep icon="🔄" label="Passation instantanée" sub="N’importe qui peut reprendre le chantier en 1h" color={GREEN} bg="#F0FAF4" border="#d4edda" accent={GREEN}/>
            </Anim>
          </div>
          <Anim delay={350} active={cur === 3}>
            <div style={{ marginTop: "16px", padding: "14px", borderRadius: "10px", background: "#F0FAF4", border: "1px solid #d4edda", textAlign: "center" }}>
              <p style={{ fontSize: "12px", color: GREEN, fontWeight: 600, margin: 0 }}>
                La mémoire du chantier ne dépend plus d'une seule personne.
              </p>
            </div>
          </Anim>
        </Slide>

        {/* SLIDE 5: MORALE */}
        <Slide active={cur === 4} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "460px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 4}>
              <Tag>La morale</Tag>
            </Anim>
            <Anim delay={100} active={cur === 4}>
              <div style={{ fontSize: "56px", color: `${GOLD}30`, margin: "0 0 12px", fontFamily: "Georgia, serif" }}>“</div>
              <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(22px, 4.5vw, 32px)", color: DARK, lineHeight: 1.35, margin: "0 0 24px" }}>
                Ce n'est pas un problème RH.
              </p>
            </Anim>
            <Anim delay={250} active={cur === 4}>
              <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(22px, 4.5vw, 32px)", color: GOLD, lineHeight: 1.35, margin: "0 0 24px" }}>
                C'est un problème de process.
              </p>
            </Anim>
            <Anim delay={400} active={cur === 4}>
              <div style={{ width: "40px", height: "1px", background: GOLD, margin: "0 auto 20px" }}/>
              <p style={{ fontSize: "14px", color: "#888", lineHeight: 1.6 }}>
                Les gens partent. C'est normal.<br/>Ce qui n'est pas normal, c'est que l'info parte avec eux.
              </p>
            </Anim>
          </div>
        </Slide>

        {/* Navigation */}
        <div style={{
          position: "absolute", bottom: "16px", left: 0, right: 0,
          display: "flex", alignItems: "center", justifyContent: "center", gap: "12px",
          zIndex: 20,
        }}>
          <button onClick={prev} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === 0 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronLeft/></button>
          <div style={{ display: "flex", gap: "4px" }}>
            {Array.from({ length: TOTAL }, (_, i) => (
              <button key={i} onClick={() => go(i)} style={{
                width: i === cur ? "16px" : "6px", height: "6px", borderRadius: "3px",
                background: i === cur ? GOLD : "#ddd", border: "none", cursor: "pointer",
                transition: "all 0.3s ease",
              }}/>
            ))}
          </div>
          <button onClick={next} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === TOTAL - 1 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronRight/></button>
        </div>

        <p style={{ position: "absolute", bottom: "52px", left: 0, right: 0, textAlign: "center", fontSize: "10px", color: "#ccc" }}>
          ← → pour naviguer
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Carousel/>);
</script>
</body>
</html>
