<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Applis terrain — Constructech Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F3EE; font-family: 'DM Sans', sans-serif; }
    @keyframes fadeCount { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const GOLD = "#C8A84E";
const DARK = "#1a1a2e";
const RED = "#e74c3c";
const GREEN = "#27ae60";
const ORANGE = "#e67e22";

function NumberTicker({ value, suffix = "", prefix = "", duration = 1200, active }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    if (!active) { setDisplay(0); return; }
    const num = parseInt(value);
    if (isNaN(num)) return;
    const t0 = Date.now();
    const tick = () => {
      const p = Math.min((Date.now() - t0) / duration, 1);
      setDisplay(Math.round((1 - Math.pow(1 - p, 3)) * num));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [active, value, duration]);
  return <span>{prefix}{display.toLocaleString("fr-FR")}{suffix}</span>;
}

function Slide({ active, dir, children }) {
  return (
    <div style={{
      position: "absolute", inset: 0,
      opacity: active ? 1 : 0,
      transform: active ? "translateX(0)" : dir === "next" ? "translateX(40px)" : "translateX(-40px)",
      transition: "all 0.45s cubic-bezier(0.16, 1, 0.3, 1)",
      pointerEvents: active ? "auto" : "none",
      display: "flex", flexDirection: "column", justifyContent: "center",
      padding: "40px 36px", overflow: "hidden",
    }}>
      {children}
    </div>
  );
}

function Anim({ children, delay = 0, active }) {
  return (
    <div style={{
      opacity: active ? 1 : 0,
      transform: active ? "translateY(0)" : "translateY(12px)",
      transition: `all 0.35s cubic-bezier(0.16, 1, 0.3, 1) ${delay}ms`,
    }}>
      {children}
    </div>
  );
}

const Tag = ({ children, color = GOLD }) => (
  <span style={{
    display: "inline-block", padding: "3px 12px", borderRadius: "100px",
    fontSize: "10px", fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase",
    color, border: `1px solid ${color}30`, background: `${color}0A`, marginBottom: "16px",
  }}>{children}</span>
);

const ChevronLeft = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
);
const ChevronRight = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
);

function Carousel() {
  const [cur, setCur] = useState(0);
  const [dir, setDir] = useState("next");
  const TOTAL = 6;

  const go = (i) => { setDir(i > cur ? "next" : "prev"); setCur(i); };
  const next = () => go(Math.min(cur + 1, TOTAL - 1));
  const prev = () => go(Math.max(cur - 1, 0));

  useEffect(() => {
    const h = (e) => { if (e.key === "ArrowRight") next(); if (e.key === "ArrowLeft") prev(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [cur]);

  return (
    <div style={{
      fontFamily: "'DM Sans', sans-serif",
      background: "#F5F3EE",
      minHeight: "100vh",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: "20px",
    }}>
      <div style={{
        width: "100%", maxWidth: "680px", aspectRatio: "4/5",
        background: "#fff", borderRadius: "16px",
        boxShadow: "0 1px 2px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06)",
        position: "relative", overflow: "hidden", border: "1px solid #e8e5e0",
      }}>
        {/* Progress bar */}
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: "#eee", zIndex: 20 }}>
          <div style={{ height: "100%", width: `${((cur + 1) / TOTAL) * 100}%`, background: GOLD, transition: "width 0.4s ease", borderRadius: "0 1px 1px 0" }}/>
        </div>
        <div style={{ position: "absolute", top: "14px", right: "18px", fontSize: "11px", color: "#bbb", zIndex: 20, fontVariantNumeric: "tabular-nums" }}>
          {cur + 1}/{TOTAL}
        </div>

        {/* SLIDE 1: COVER */}
        <Slide active={cur === 0} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "500px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 0}><Tag>Constructech Club</Tag></Anim>
            <Anim delay={80} active={cur === 0}>
              <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(22px, 4.5vw, 34px)", fontWeight: 400, color: DARK, lineHeight: 1.25, margin: "0 0 16px" }}>
                Les 30 secondes les plus importantes sur un chantier.
              </h1>
            </Anim>
            <Anim delay={200} active={cur === 0}>
              <p style={{ fontSize: "14px", color: "#999", lineHeight: 1.6 }}>
                C'est le temps que ton equipe accorde a une appli.<br/>Apres, elle revient au papier.
              </p>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 2: PROBLEME — 500€/mois */}
        <Slide active={cur === 1} dir={dir}>
          <Anim delay={0} active={cur === 1}>
            <Tag color={RED}>Le probleme</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 18px" }}>L'outil que personne n'utilise</h2>
          </Anim>
          <Anim delay={100} active={cur === 1}>
            <div style={{ background: "#FFF5F5", borderRadius: "14px", border: "1px solid #fde2e2", padding: "24px", textAlign: "center", marginBottom: "16px" }}>
              <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "44px", color: RED, margin: "0 0 4px", lineHeight: 1 }}>
                <NumberTicker value={500} prefix="" suffix="€" active={cur === 1}/><span style={{ fontSize: "20px" }}>/mois</span>
              </p>
              <p style={{ fontSize: "13px", color: RED, margin: "4px 0 0", fontWeight: 600 }}>d'abonnement logiciel</p>
            </div>
          </Anim>
          <Anim delay={200} active={cur === 1}>
            <div style={{ background: "#FAF9F6", borderRadius: "10px", border: "1px solid #e8e5e0", padding: "16px", textAlign: "center" }}>
              <p style={{ fontSize: "13px", color: "#888", margin: 0, lineHeight: 1.5 }}>
                L'equipe terrain ne l'ouvre meme plus.<br/>Le chef de chantier note sur un carnet.
              </p>
            </div>
          </Anim>
        </Slide>

        {/* SLIDE 3: POURQUOI — 4 cards */}
        <Slide active={cur === 2} dir={dir}>
          <Anim delay={0} active={cur === 2}>
            <Tag color={ORANGE}>Pourquoi ?</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 16px" }}>4 raisons d'abandon</h2>
          </Anim>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
            {[
              { icon: "👆", title: "10 clics pour 1 info", sub: "Interface pensee pour le bureau, pas le terrain", color: RED, delay: 80 },
              { icon: "⏳", title: "30 sec de chargement", sub: "Sur le reseau mobile du chantier... si il y en a un", color: RED, delay: 150 },
              { icon: "🧤", title: "Inutilisable avec des gants", sub: "Boutons minuscules, clavier obligatoire", color: ORANGE, delay: 220 },
              { icon: "📵", title: "Hors connexion = hors service", sub: "Sous-sol, parking, zone blanche... rien ne marche", color: ORANGE, delay: 290 },
            ].map((item, i) => (
              <Anim key={i} delay={item.delay} active={cur === 2}>
                <div style={{ background: "#FAF9F6", borderRadius: "12px", border: "1px solid #e8e5e0", padding: "14px", textAlign: "center", borderTop: `3px solid ${item.color}` }}>
                  <p style={{ fontSize: "22px", margin: "0 0 6px" }}>{item.icon}</p>
                  <p style={{ fontSize: "11px", fontWeight: 600, color: DARK, margin: "0 0 3px" }}>{item.title}</p>
                  <p style={{ fontSize: "9px", color: "#999", margin: 0, lineHeight: 1.3 }}>{item.sub}</p>
                </div>
              </Anim>
            ))}
          </div>
        </Slide>

        {/* SLIDE 4: CHIFFRE — 18% */}
        <Slide active={cur === 3} dir={dir}>
          <Anim delay={0} active={cur === 3}>
            <Tag color={RED}>Le chiffre</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 20px" }}>Le taux d'adoption reel</h2>
          </Anim>
          <Anim delay={100} active={cur === 3}>
            <div style={{ background: "#FFF5F5", borderRadius: "14px", border: "1px solid #fde2e2", padding: "32px", textAlign: "center", marginBottom: "16px" }}>
              <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "72px", color: RED, margin: "0 0 4px", lineHeight: 1 }}>
                <NumberTicker value={18} suffix="%" active={cur === 3}/>
              </p>
              <p style={{ fontSize: "14px", color: RED, margin: "4px 0 0", fontWeight: 600 }}>d'adoption terrain en moyenne</p>
            </div>
          </Anim>
          <Anim delay={250} active={cur === 3}>
            <div style={{ display: "flex", gap: "10px" }}>
              <div style={{ flex: 1, background: "#FAF9F6", borderRadius: "10px", border: "1px solid #e8e5e0", padding: "14px", textAlign: "center" }}>
                <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: ORANGE, margin: "0 0 2px" }}>82%</p>
                <p style={{ fontSize: "9px", color: "#999", margin: 0 }}>utilisent encore le papier ou WhatsApp</p>
              </div>
              <div style={{ flex: 1, background: "#FAF9F6", borderRadius: "10px", border: "1px solid #e8e5e0", padding: "14px", textAlign: "center" }}>
                <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: RED, margin: "0 0 2px" }}>6K€</p>
                <p style={{ fontSize: "9px", color: "#999", margin: 0 }}>par an en licences non utilisees</p>
              </div>
            </div>
          </Anim>
        </Slide>

        {/* SLIDE 5: SOLUTION */}
        <Slide active={cur === 4} dir={dir}>
          <Anim delay={0} active={cur === 4}>
            <Tag color={GREEN}>La solution</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 18px" }}>Des outils faits pour le terrain</h2>
          </Anim>
          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
            {[
              { icon: "🎤", title: "Vocal → Rapport", desc: "Le chef de chantier parle. Le rapport se genere automatiquement.", color: GREEN, delay: 80 },
              { icon: "📸", title: "Photo → Classee", desc: "Il prend une photo. Elle est taguee, datee, classee dans le bon lot.", color: GREEN, delay: 160 },
              { icon: "📝", title: "Formulaire → 3 questions", desc: "Pas 30 champs. 3 questions essentielles. 20 secondes.", color: GREEN, delay: 240 },
            ].map((item, i) => (
              <Anim key={i} delay={item.delay} active={cur === 4}>
                <div style={{ background: "#F0FAF4", borderRadius: "12px", border: "1px solid #d4edda", padding: "16px", display: "flex", gap: "12px", alignItems: "flex-start", borderLeft: `4px solid ${item.color}` }}>
                  <span style={{ fontSize: "22px", flexShrink: 0 }}>{item.icon}</span>
                  <div>
                    <p style={{ fontSize: "13px", fontWeight: 600, color: DARK, margin: "0 0 3px" }}>{item.title}</p>
                    <p style={{ fontSize: "11px", color: "#888", margin: 0, lineHeight: 1.4 }}>{item.desc}</p>
                  </div>
                </div>
              </Anim>
            ))}
          </div>
          <Anim delay={350} active={cur === 4}>
            <p style={{ fontSize: "12px", color: "#bbb", textAlign: "center", marginTop: "16px", fontStyle: "italic" }}>
              L'outil doit s'adapter au terrain. Pas l'inverse.
            </p>
          </Anim>
        </Slide>

        {/* SLIDE 6: CTA */}
        <Slide active={cur === 5} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "440px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 5}>
              <div style={{ width: "48px", height: "48px", borderRadius: "50%", background: `${GOLD}15`, border: `1px solid ${GOLD}30`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", fontSize: "22px" }}>📱</div>
            </Anim>
            <Anim delay={100} active={cur === 5}>
              <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "26px", color: DARK, lineHeight: 1.3, margin: "0 0 12px" }}>
                T'as un outil VRAIMENT adopte par le terrain ?
              </h2>
            </Anim>
            <Anim delay={200} active={cur === 5}>
              <p style={{ fontSize: "14px", color: "#888", lineHeight: 1.6, margin: "0 0 28px" }}>
                Dis-nous en commentaire quel outil tient la route sur tes chantiers. Et lequel a fini au placard.
              </p>
            </Anim>
            <Anim delay={300} active={cur === 5}>
              <div style={{
                display: "inline-flex", alignItems: "center", gap: "8px",
                padding: "14px 32px", borderRadius: "100px",
                background: GOLD, color: "#fff", fontSize: "14px", fontWeight: 600,
              }}>
                Commente ton experience — constructech.club
              </div>
            </Anim>
            <Anim delay={450} active={cur === 5}>
              <div style={{ marginTop: "24px", display: "flex", gap: "8px", justifyContent: "center", flexWrap: "wrap" }}>
                {["UX terrain", "Adoption outil", "Zero friction"].map((t, i) => (
                  <span key={i} style={{ padding: "5px 10px", borderRadius: "6px", background: "#FAF9F6", border: "1px solid #e8e5e0", fontSize: "10px", color: "#888", fontWeight: 500 }}>{t}</span>
                ))}
              </div>
            </Anim>
          </div>
        </Slide>

        {/* Navigation */}
        <div style={{
          position: "absolute", bottom: "16px", left: 0, right: 0,
          display: "flex", alignItems: "center", justifyContent: "center", gap: "12px",
          zIndex: 20,
        }}>
          <button onClick={prev} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === 0 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronLeft/></button>
          <div style={{ display: "flex", gap: "4px" }}>
            {Array.from({ length: TOTAL }, (_, i) => (
              <button key={i} onClick={() => go(i)} style={{
                width: i === cur ? "16px" : "6px", height: "6px", borderRadius: "3px",
                background: i === cur ? GOLD : "#ddd", border: "none", cursor: "pointer",
                transition: "all 0.3s ease",
              }}/>
            ))}
          </div>
          <button onClick={next} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === TOTAL - 1 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronRight/></button>
        </div>

        <p style={{ position: "absolute", bottom: "52px", left: 0, right: 0, textAlign: "center", fontSize: "10px", color: "#ccc" }}>
          ← → pour naviguer
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Carousel/>);
</script>
</body>
</html>
