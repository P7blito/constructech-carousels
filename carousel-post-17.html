<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marges fondent — Constructech Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F5F3EE; font-family: 'DM Sans', sans-serif; }
    @keyframes fadeCount { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const GOLD = "#C8A84E";
const DARK = "#1a1a2e";
const RED = "#e74c3c";
const GREEN = "#27ae60";
const ORANGE = "#e67e22";

function NumberTicker({ value, suffix = "", prefix = "", duration = 1200, active, decimals = 0 }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    if (!active) { setDisplay(0); return; }
    const num = parseFloat(value);
    if (isNaN(num)) return;
    const t0 = Date.now();
    const tick = () => {
      const p = Math.min((Date.now() - t0) / duration, 1);
      const v = (1 - Math.pow(1 - p, 3)) * num;
      setDisplay(decimals > 0 ? parseFloat(v.toFixed(decimals)) : Math.round(v));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [active, value, duration]);
  return <span>{prefix}{decimals > 0 ? display.toFixed(decimals).replace(".", ",") : display.toLocaleString("fr-FR")}{suffix}</span>;
}

function Slide({ active, dir, children }) {
  return (
    <div style={{
      position: "absolute", inset: 0,
      opacity: active ? 1 : 0,
      transform: active ? "translateX(0)" : dir === "next" ? "translateX(40px)" : "translateX(-40px)",
      transition: "all 0.45s cubic-bezier(0.16, 1, 0.3, 1)",
      pointerEvents: active ? "auto" : "none",
      display: "flex", flexDirection: "column", justifyContent: "center",
      padding: "40px 36px", overflow: "hidden",
    }}>
      {children}
    </div>
  );
}

function Anim({ children, delay = 0, active }) {
  return (
    <div style={{
      opacity: active ? 1 : 0,
      transform: active ? "translateY(0)" : "translateY(12px)",
      transition: `all 0.35s cubic-bezier(0.16, 1, 0.3, 1) ${delay}ms`,
    }}>
      {children}
    </div>
  );
}

const Tag = ({ children, color = GOLD }) => (
  <span style={{
    display: "inline-block", padding: "3px 12px", borderRadius: "100px",
    fontSize: "10px", fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase",
    color, border: `1px solid ${color}30`, background: `${color}0A`, marginBottom: "16px",
  }}>{children}</span>
);

const ChevronLeft = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
);
const ChevronRight = ({ size = 16, color = "#555" }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
);

/* Gauge component */
function Gauge({ value, max = 12, danger = 5, healthy = 7, active, label }) {
  const pct = active ? (value / max) * 100 : 0;
  const color = value <= danger ? RED : value >= healthy ? GREEN : ORANGE;
  return (
    <div style={{ width: "100%", marginBottom: "8px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
        <span style={{ fontSize: "10px", color: "#999" }}>{label}</span>
        <span style={{ fontSize: "10px", fontWeight: 700, color }}>{value}%</span>
      </div>
      <div style={{ height: "10px", background: "#f0ede8", borderRadius: "5px", overflow: "hidden", position: "relative" }}>
        <div style={{ position: "absolute", left: `${(danger / max) * 100}%`, top: 0, bottom: 0, width: "1px", background: `${RED}40` }}/>
        <div style={{ position: "absolute", left: `${(healthy / max) * 100}%`, top: 0, bottom: 0, width: "1px", background: `${GREEN}40` }}/>
        <div style={{ height: "100%", width: `${pct}%`, background: color, borderRadius: "5px", transition: "width 1.2s cubic-bezier(0.16, 1, 0.3, 1)" }}/>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: "3px" }}>
        <span style={{ fontSize: "8px", color: RED }}>Danger</span>
        <span style={{ fontSize: "8px", color: GREEN }}>Sain</span>
      </div>
    </div>
  );
}

function Carousel() {
  const [cur, setCur] = useState(0);
  const [dir, setDir] = useState("next");
  const TOTAL = 6;

  const go = (i) => { setDir(i > cur ? "next" : "prev"); setCur(i); };
  const next = () => go(Math.min(cur + 1, TOTAL - 1));
  const prev = () => go(Math.max(cur - 1, 0));

  useEffect(() => {
    const h = (e) => { if (e.key === "ArrowRight") next(); if (e.key === "ArrowLeft") prev(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [cur]);

  return (
    <div style={{
      fontFamily: "'DM Sans', sans-serif",
      background: "#F5F3EE",
      minHeight: "100vh",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: "20px",
    }}>
      <div style={{
        width: "100%", maxWidth: "680px", aspectRatio: "4/5",
        background: "#fff", borderRadius: "16px",
        boxShadow: "0 1px 2px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06)",
        position: "relative", overflow: "hidden", border: "1px solid #e8e5e0",
      }}>
        {/* Progress bar */}
        <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: "#eee", zIndex: 20 }}>
          <div style={{ height: "100%", width: `${((cur + 1) / TOTAL) * 100}%`, background: GOLD, transition: "width 0.4s ease", borderRadius: "0 1px 1px 0" }}/>
        </div>
        <div style={{ position: "absolute", top: "14px", right: "18px", fontSize: "11px", color: "#bbb", zIndex: 20, fontVariantNumeric: "tabular-nums" }}>
          {cur + 1}/{TOTAL}
        </div>

        {/* SLIDE 1: COVER */}
        <Slide active={cur === 0} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "500px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 0}><Tag>Constructech Club</Tag></Anim>
            <Anim delay={80} active={cur === 0}>
              <h1 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(24px, 4.5vw, 36px)", fontWeight: 400, color: DARK, lineHeight: 1.15, margin: "0 0 16px" }}>
                Ce dirigeant pensait manquer de talent.
              </h1>
            </Anim>
            <Anim delay={160} active={cur === 0}>
              <div style={{ width: "40px", height: "1px", background: GOLD, margin: "0 auto 16px" }}/>
              <p style={{ fontSize: "clamp(18px, 4vw, 28px)", fontWeight: 500, color: GOLD, margin: "0 0 24px", lineHeight: 1.3, fontFamily: "'Instrument Serif', serif" }}>
                Il manquait de visibilité.
              </p>
            </Anim>
            <Anim delay={280} active={cur === 0}>
              <p style={{ fontSize: "13px", color: "#999", lineHeight: 1.6 }}>
                Quand vos marges fondent sans que personne<br/>ne sache pourquoi.
              </p>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 2: CONSTAT */}
        <Slide active={cur === 1} dir={dir}>
          <div style={{ textAlign: "center" }}>
            <Anim delay={0} active={cur === 1}>
              <Tag color={RED}>Le constat</Tag>
              <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 20px" }}>La marge réelle</h2>
            </Anim>
            <Anim delay={100} active={cur === 1}>
              <div style={{ background: "#FFF5F5", borderRadius: "14px", border: "1px solid #fde2e2", padding: "28px", textAlign: "center", marginBottom: "20px" }}>
                <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "64px", color: RED, margin: "0 0 4px", lineHeight: 1 }}>
                  <NumberTicker value={3.2} suffix="%" active={cur === 1} decimals={1}/>
                </p>
                <p style={{ fontSize: "13px", color: RED, fontWeight: 500, margin: 0 }}>marge nette réelle</p>
              </div>
            </Anim>
            <Anim delay={250} active={cur === 1}>
              <Gauge value={3.2} active={cur === 1} label="Marge nette"/>
            </Anim>
            <Anim delay={400} active={cur === 1}>
              <p style={{ fontSize: "12px", color: "#bbb", marginTop: "14px", fontStyle: "italic" }}>
                Le dirigeant pensait être à 7%. La réalité : 3,2%.
              </p>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 3: LES FUITES */}
        <Slide active={cur === 2} dir={dir}>
          <Anim delay={0} active={cur === 2}>
            <Tag color={RED}>Les fuites</Tag>
            <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "22px", color: DARK, margin: "0 0 16px" }}>Où passe l'argent ?</h2>
          </Anim>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
            {[
              { icon: "⏰", title: "Heures sup non track\u00e9es", desc: "Samedi matin, d\u00e9placements... pas compt\u00e9s", color: RED, val: "-1,2%" },
              { icon: "🧱", title: "Mat\u00e9riaux gaspill\u00e9s", desc: "Commandes en double, casse, surplus", color: ORANGE, val: "-0,8%" },
              { icon: "🚗", title: "Trajets non refactur\u00e9s", desc: "Allers-retours entre chantiers", color: ORANGE, val: "-0,5%" },
              { icon: "🔧", title: "Gestes repris", desc: "Malfacons, reprises, corrections", color: RED, val: "-1,3%" },
            ].map((item, i) => (
              <Anim key={i} delay={100 + i * 80} active={cur === 2}>
                <div style={{ background: "#FAF9F6", borderRadius: "12px", border: "1px solid #e8e5e0", padding: "16px", position: "relative" }}>
                  <div style={{ position: "absolute", top: "10px", right: "10px", fontSize: "10px", fontWeight: 700, color: item.color }}>{item.val}</div>
                  <p style={{ fontSize: "22px", margin: "0 0 6px" }}>{item.icon}</p>
                  <p style={{ fontSize: "12px", fontWeight: 600, color: DARK, margin: "0 0 4px" }}>{item.title}</p>
                  <p style={{ fontSize: "10px", color: "#999", margin: 0, lineHeight: 1.4 }}>{item.desc}</p>
                </div>
              </Anim>
            ))}
          </div>
        </Slide>

        {/* SLIDE 4: CITATION */}
        <Slide active={cur === 3} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "460px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 3}>
              <Tag>Le vrai problème</Tag>
            </Anim>
            <Anim delay={100} active={cur === 3}>
              <div style={{ fontSize: "56px", color: `${GOLD}30`, margin: "0 0 12px", fontFamily: "Georgia, serif" }}>“</div>
              <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "clamp(20px, 4vw, 30px)", color: DARK, lineHeight: 1.35, margin: "0 0 20px", fontStyle: "italic" }}>
                Ce n'est pas une grosse erreur.<br/>C'est l'accumulation<br/>de petites fuites.
              </p>
              <div style={{ width: "40px", height: "1px", background: GOLD, margin: "0 auto 20px" }}/>
            </Anim>
            <Anim delay={250} active={cur === 3}>
              <p style={{ fontSize: "13px", color: "#999", lineHeight: 1.6, margin: "0 0 16px" }}>
                Aucune de ces pertes n'est catastrophique seule.<br/>Mais ensemble, elles mangent la moitié de votre marge.
              </p>
            </Anim>
            <Anim delay={400} active={cur === 3}>
              <div style={{ display: "flex", justifyContent: "center", gap: "16px" }}>
                {["-1,2%", "-0,8%", "-0,5%", "-1,3%"].map((v, i) => (
                  <div key={i} style={{ padding: "6px 12px", borderRadius: "8px", background: "#FFF5F5", border: "1px solid #fde2e2" }}>
                    <p style={{ fontSize: "12px", color: RED, fontWeight: 700, margin: 0 }}>{v}</p>
                  </div>
                ))}
              </div>
              <p style={{ fontSize: "10px", color: "#ccc", marginTop: "8px" }}>= -3,8% de marge perdue</p>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 5: RESULTAT */}
        <Slide active={cur === 4} dir={dir}>
          <div style={{ textAlign: "center" }}>
            <Anim delay={0} active={cur === 4}>
              <Tag color={GREEN}>Résultat</Tag>
              <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "18px", color: "#999", margin: "0 0 8px" }}>Marge nette après correction</p>
            </Anim>
            <Anim delay={150} active={cur === 4}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "20px", margin: "20px 0" }}>
                <div style={{ textAlign: "center" }}>
                  <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "52px", color: RED, margin: 0, lineHeight: 1 }}>
                    <NumberTicker value={3.2} suffix="%" active={cur === 4} decimals={1}/>
                  </p>
                  <p style={{ fontSize: "11px", color: RED, fontWeight: 600, margin: "4px 0 0", textTransform: "uppercase", letterSpacing: "0.06em" }}>Avant</p>
                </div>
                <div style={{ fontSize: "28px", color: GREEN }}>→</div>
                <div style={{ textAlign: "center" }}>
                  <p style={{ fontFamily: "'Instrument Serif', serif", fontSize: "52px", color: GREEN, margin: 0, lineHeight: 1 }}>
                    <NumberTicker value={9} suffix="%" active={cur === 4}/>
                  </p>
                  <p style={{ fontSize: "11px", color: GREEN, fontWeight: 600, margin: "4px 0 0", textTransform: "uppercase", letterSpacing: "0.06em" }}>Après</p>
                </div>
              </div>
            </Anim>
            <Anim delay={300} active={cur === 4}>
              <div style={{ margin: "10px 0 16px" }}>
                <Gauge value={9} active={cur === 4} label="Marge nette apr\u00e8s corrections"/>
              </div>
            </Anim>
            <Anim delay={450} active={cur === 4}>
              <div style={{ background: "#F0FAF4", borderRadius: "14px", border: "1px solid #d4edda", padding: "16px" }}>
                <p style={{ fontSize: "13px", color: "#444", lineHeight: 1.6, margin: 0 }}>
                  Pas de miracle. Juste de la visibilité sur ce qui coûte vraiment.
                </p>
              </div>
            </Anim>
          </div>
        </Slide>

        {/* SLIDE 6: CTA */}
        <Slide active={cur === 5} dir={dir}>
          <div style={{ textAlign: "center", maxWidth: "440px", margin: "0 auto" }}>
            <Anim delay={0} active={cur === 5}>
              <div style={{ width: "48px", height: "48px", borderRadius: "50%", background: `${GOLD}15`, border: `1px solid ${GOLD}30`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", fontSize: "22px" }}>🔍</div>
            </Anim>
            <Anim delay={100} active={cur === 5}>
              <h2 style={{ fontFamily: "'Instrument Serif', serif", fontSize: "28px", color: DARK, lineHeight: 1.3, margin: "0 0 12px" }}>
                Audit flash :<br/>30 min, gratuit.
              </h2>
            </Anim>
            <Anim delay={200} active={cur === 5}>
              <p style={{ fontSize: "14px", color: "#888", lineHeight: 1.6, margin: "0 0 28px" }}>
                On identifie vos fuites de marge en un appel.<br/>Pas de logiciel. Du concret.
              </p>
            </Anim>
            <Anim delay={300} active={cur === 5}>
              <div style={{
                display: "inline-flex", alignItems: "center", gap: "8px",
                padding: "14px 32px", borderRadius: "100px",
                background: GOLD, color: "#fff", fontSize: "14px", fontWeight: 600,
              }}>
                DM ouverts — constructech.club
              </div>
            </Anim>
            <Anim delay={450} active={cur === 5}>
              <div style={{ marginTop: "24px", display: "flex", gap: "8px", justifyContent: "center", flexWrap: "wrap" }}>
                {["Audit flash 30min", "Diagnostic marge", "Plan d'action"].map((t, i) => (
                  <span key={i} style={{ padding: "5px 10px", borderRadius: "6px", background: "#FAF9F6", border: "1px solid #e8e5e0", fontSize: "10px", color: "#888", fontWeight: 500 }}>{t}</span>
                ))}
              </div>
            </Anim>
          </div>
        </Slide>

        {/* Navigation */}
        <div style={{
          position: "absolute", bottom: "16px", left: 0, right: 0,
          display: "flex", alignItems: "center", justifyContent: "center", gap: "12px",
          zIndex: 20,
        }}>
          <button onClick={prev} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === 0 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronLeft/></button>
          <div style={{ display: "flex", gap: "4px" }}>
            {Array.from({ length: TOTAL }, (_, i) => (
              <button key={i} onClick={() => go(i)} style={{
                width: i === cur ? "16px" : "6px", height: "6px", borderRadius: "3px",
                background: i === cur ? GOLD : "#ddd", border: "none", cursor: "pointer",
                transition: "all 0.3s ease",
              }}/>
            ))}
          </div>
          <button onClick={next} style={{
            width: "32px", height: "32px", borderRadius: "50%", border: "1px solid #e8e5e0",
            background: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            opacity: cur === TOTAL - 1 ? 0.3 : 1, transition: "opacity 0.2s",
          }}><ChevronRight/></button>
        </div>

        <p style={{ position: "absolute", bottom: "52px", left: 0, right: 0, textAlign: "center", fontSize: "10px", color: "#ccc" }}>
          ← → pour naviguer
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Carousel/>);
</script>
</body>
</html>
